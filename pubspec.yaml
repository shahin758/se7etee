name: se7etee
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  pinput: ^6.0.2
  gap: ^3.0.1
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  lottie: ^3.3.3
  shared_preferences: ^2.5.4
  carousel_slider: ^5.1.2
  smooth_page_indicator: ^2.0.1
  shimmer: ^3.0.0
  go_router: ^17.2.1
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  easy_localization: ^3.0.8
  dartz: ^0.10.1
  get_it: ^9.2.1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_nav_bar: ^5.0.7
  http: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
